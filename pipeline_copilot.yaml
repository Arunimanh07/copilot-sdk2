trigger:
- main

pr:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

# 🔹 Install Node.js
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

# 🔹 Debug
- script: |
    ls -la
  displayName: 'Debug: List root files'

# 🔹 Install dependencies
- script: |
    npm install
  displayName: 'Install root dependencies'

# 🔹 Install frontend dependencies
- script: |
    if [ -d "frontend" ]; then
      cd frontend
      npm install
    else
      echo "No frontend folder found"
    fi
  displayName: 'Install frontend dependencies'

# 🔹 Build frontend
- script: |
    npm run build:frontend || echo "Skipping frontend build"
  displayName: 'Build frontend'

# 🔹 Build backend
- script: |
    npm run build:server || echo "Skipping backend build"
  displayName: 'Build backend'

# 🔹 Run Snyk Test + Monitor (FIXED)
- script: |
    npm install -g snyk

    snyk test --severity-threshold=high

    snyk monitor
  env:
    SNYK_TOKEN: $(SNYK_TOKEN)
  displayName: 'Run Snyk Test & Monitor'