models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the city_lookup tool with countryCode 'US' and the currency_lookup tool with countryCode 'US'. Tell me both
          results.
      - role: assistant
        content: I'll call both tools for you with the country code 'US'.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Looking up city and currency"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: city_lookup
              arguments: '{"countryCode":"US"}'
      - role: assistant
        tool_calls:
          - id: toolcall_2
            type: function
            function:
              name: currency_lookup
              arguments: '{"countryCode":"US"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the city_lookup tool with countryCode 'US' and the currency_lookup tool with countryCode 'US'. Tell me both
          results.
      - role: assistant
        content: I'll call both tools for you with the country code 'US'.
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Looking up city and currency"}'
          - id: toolcall_1
            type: function
            function:
              name: city_lookup
              arguments: '{"countryCode":"US"}'
          - id: toolcall_2
            type: function
            function:
              name: currency_lookup
              arguments: '{"countryCode":"US"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Intent logged
      - role: tool
        tool_call_id: toolcall_1
        content: CITY_FOR_US
      - role: tool
        tool_call_id: toolcall_2
        content: CURRENCY_FOR_US
      - role: assistant
        content: |-
          Here are the results:
          - **City for US**: CITY_FOR_US
          - **Currency for US**: CURRENCY_FOR_US
