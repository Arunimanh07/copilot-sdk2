      - role: tool
        tool_call_id: toolcall_3
        content: Intent logged
      - role: tool
        tool_call_id: toolcall_4
        content: STABLE_still_here
      - role: assistant
        content: >-
          **stable_tool** returned: `STABLE_still_here`


          The **ephemeral_tool** is no longer available (it was removed as indicated in the tools_changed_notice), so I
