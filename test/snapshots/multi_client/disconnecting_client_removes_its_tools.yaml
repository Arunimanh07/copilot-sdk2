          - id: toolcall_1
            type: function
            function:
              name: stable_tool
              arguments: '{"input":"test1"}'
          - id: toolcall_2
            type: function
            function:
              name: ephemeral_tool
              arguments: '{"input":"test2"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Intent logged
      - role: tool
        tool_call_id: toolcall_1
        content: STABLE_test1
      - role: tool
        tool_call_id: toolcall_2
        content: EPHEMERAL_test2
      - role: assistant
        content: |-
          Both tools executed successfully:
          - **stable_tool** returned: `STABLE_test1`
          - **ephemeral_tool** returned: `EPHEMERAL_test2`
      - role: user
        content: >-
          <tools_changed_notice>

