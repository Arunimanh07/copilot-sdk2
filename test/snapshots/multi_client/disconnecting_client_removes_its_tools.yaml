models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the stable_tool with input 'test1' and the ephemeral_tool with input 'test2'. Tell me both results.
      - role: assistant
        content: I'll call both tools for you and report the results.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Testing stable and ephemeral tools"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: stable_tool
              arguments: '{"input":"test1"}'
      - role: assistant
        tool_calls:
          - id: toolcall_2
            type: function
            function:
              name: ephemeral_tool
              arguments: '{"input":"test2"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the stable_tool with input 'test1' and the ephemeral_tool with input 'test2'. Tell me both results.
      - role: assistant
        content: I'll call both tools for you and report the results.
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Testing stable and ephemeral tools"}'
          - id: toolcall_1
            type: function
            function:
              name: stable_tool
              arguments: '{"input":"test1"}'
          - id: toolcall_2
            type: function
            function:
              name: ephemeral_tool
              arguments: '{"input":"test2"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Intent logged
      - role: tool
        tool_call_id: toolcall_1
        content: STABLE_test1
      - role: tool
        tool_call_id: toolcall_2
        content: EPHEMERAL_test2
      - role: assistant
        content: |-
          Both tools executed successfully:
          - **stable_tool** returned: `STABLE_test1`
          - **ephemeral_tool** returned: `EPHEMERAL_test2`
      - role: user
        content: >-
          <tools_changed_notice>

          Tools no longer available: ephemeral_tool


          Important: Do not attempt to call tools that are no longer available unless you've been notified that they're
          available again.

          </tools_changed_notice>


          Use the stable_tool with input 'still_here'. Also try using ephemeral_tool if it is available.
      - role: assistant
        content: I'll call the stable_tool and check on the ephemeral_tool availability.
      - role: assistant
        tool_calls:
          - id: toolcall_3
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Testing tool availability"}'
      - role: assistant
        tool_calls:
          - id: toolcall_4
            type: function
            function:
              name: stable_tool
              arguments: '{"input":"still_here"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the stable_tool with input 'test1' and the ephemeral_tool with input 'test2'. Tell me both results.
      - role: assistant
        content: I'll call both tools for you and report the results.
        tool_calls:
          - id: toolcall_0
